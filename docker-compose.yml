services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: sportdesk_admin
      POSTGRES_PASSWORD: shum_pass_i_fort
      POSTGRES_DB: sportdesk_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportdesk_admin -d sportdesk_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: always
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=sportdesk_db;Username=sportdesk_admin;Password=shum_pass_i_fort"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
